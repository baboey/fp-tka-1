[managers]
tka-vm1-manager ansible_host=10.148.0.8 ansible_user=SSH_USER

[workers]
tka-vm2-flaskworker ansible_host=10.148.0.4 ansible_user=SSH_USER
tka-vm3-flaskworker ansible_host=10.148.0.5 ansible_user=SSH_USER

[database]
tka-vm4-mongodb ansible_host=10.148.0.6 ansible_user=SSH_USER

[locust]
tka-vm5-locust ansible_host=LOCUST_PUBLIC_IP ansible_user=SSH_USER

[swarm:children]
managers
workers

[managers:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="ssh -F /dev/null -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/ansible-known-hosts -i ~/.ssh/google_compute_engine -W %h:%p SSH_USER@LOCUST_PUBLIC_IP"'

[workers:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="ssh -F /dev/null -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/ansible-known-hosts -i ~/.ssh/google_compute_engine -W %h:%p SSH_USER@LOCUST_PUBLIC_IP"'

[database:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="ssh -F /dev/null -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/ansible-known-hosts -i ~/.ssh/google_compute_engine -W %h:%p SSH_USER@LOCUST_PUBLIC_IP"'

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_ssh_private_key_file=~/.ssh/google_compute_engine
docker_user=SSH_USER
docker_users=["SSH_USER"]
private_ip_manager=10.148.0.8
private_ip_mongodb=10.148.0.6
private_ip_redis=10.148.0.8
docker_registry=10.148.0.8:5000
use_local_registry=true
docker_insecure_registries=["10.148.0.8:5000"]
