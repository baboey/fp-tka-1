---
- name: Provision all VMs with Docker
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
          - python3-docker
        state: present

    - name: Install Docker
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add Docker users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users | default([docker_user | default(ansible_user)]) }}"
      when: item | length > 0

    - name: Verify Docker installation
      command: docker info
      register: docker_info
      changed_when: false

    - name: Display Docker version
      debug:
        msg: "Docker installed on {{ inventory_hostname }}"
