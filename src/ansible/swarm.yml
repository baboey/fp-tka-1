---
- name: Initialize Docker Swarm on Manager
  hosts: managers
  become: yes
  tasks:
    - name: Check if Swarm is already initialized
      command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_status
      changed_when: false
      ignore_errors: yes

    - name: Initialize Swarm
      command: docker swarm init --advertise-addr {{ private_ip_manager | default(ansible_host) }}
      when: swarm_status.stdout != "active"
      register: swarm_init

    - name: Get Swarm join token (worker)
      command: docker swarm join-token worker -q
      register: worker_token
      changed_when: false

    - name: Get Swarm join token (manager)
      command: docker swarm join-token manager -q
      register: manager_token
      changed_when: false

    - name: Save tokens
      set_fact:
        swarm_worker_token: "{{ worker_token.stdout }}"
        swarm_manager_token: "{{ manager_token.stdout }}"

- name: Join workers to Swarm
  hosts: workers
  become: yes
  tasks:
    - name: Check if already in Swarm
      command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_status
      changed_when: false
      ignore_errors: yes

    - name: Join Swarm as worker
      command: >
        docker swarm join 
        --token {{ hostvars[groups['managers'][0]]['swarm_worker_token'] }}
        {{ private_ip_manager }}:2377
      when: swarm_status.stdout != "active"

- name: Verify Swarm cluster
  hosts: managers
  become: yes
  tasks:
    - name: List Swarm nodes
      command: docker node ls
      register: nodes
      changed_when: false

    - name: Display Swarm nodes
      debug:
        msg: "{{ nodes.stdout_lines }}"
