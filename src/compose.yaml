services:
  web:
    image: nginx
    container_name: web
    volumes:
      - ./nginx/nginx.conf:/tmp/nginx.conf
      - ./nginx/html:/usr/share/nginx/html:ro
    environment:
      - FLASK_SERVER_ADDR1=backend1:9091
      - FLASK_SERVER_ADDR2=backend2:9091
      - FLASK_SERVER_ADDR3=backend3:9091
      - DOLLAR=$
    command: /bin/bash -c "envsubst < /tmp/nginx.conf > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    ports:
      - "80:80"
    depends_on:
      - backend1
      - backend2
      - backend3

  backend3:
    build:
      context: flask
    stop_signal: SIGINT
    environment:
      FLASK_SERVER_PORT: 9091
      MONGO_URI: mongodb://root:root@mongo:27017/
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./flask:/src
    depends_on:
      - mongo
      - redis

  backend2:
    build:
      context: flask
    stop_signal: SIGINT
    environment:
      FLASK_SERVER_PORT: 9091
      MONGO_URI: mongodb://root:root@mongo:27017/
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./flask:/src
    depends_on:
      - mongo
      - redis

  backend1:
    build:
      context: flask
    stop_signal: SIGINT
    environment:
      FLASK_SERVER_PORT: 9091
      MONGO_URI: mongodb://root:root@mongo:27017/
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./flask:/src
    depends_on:
      - mongo
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always

  mongo:
    # using latest will result in Exit(139)
    image: mongo:7.0
    restart: always
    container_name: db
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: orderdb
      MONGO_USER: user
      MONGO_PASSWORD: user
    volumes:
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./db/dump:/dump:ro
