version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /opt/nginx/html:/usr/share/nginx/html:ro
      - /opt/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
    networks:
      - frontend

  flask:
    image: REGISTRY_PLACEHOLDER/flask-order:latest
    environment:
      - FLASK_SERVER_PORT=9091
      - MONGO_URI=mongodb://user:user@MONGO_DB_HOST:27017/orderdb?authSource=orderdb
      - REDIS_URL=redis://REDIS_HOST:6379/0
    deploy:
      replicas: 6
      restart_policy:
        condition: on-failure
        delay: 5s
    networks:
      - frontend

networks:
  frontend:
    driver: overlay
