# Configure cache zone for microcaching (30 seconds TTL)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=10m use_temp_path=off;

upstream backends {
    server $FLASK_SERVER_ADDR1;
    server $FLASK_SERVER_ADDR2;
    server $FLASK_SERVER_ADDR3;
    keepalive 32;
}
server {
    listen 80;

    # Serve frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files ${DOLLAR}uri ${DOLLAR}uri/ =404;

        # Gzip compression for static files
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
        gzip_min_length 1000;
    }

    # Proxy API requests to Flask backend with Caching for Products (read-heavy public endpoint)
    location ~ ^/products {
        proxy_pass http://backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host ${DOLLAR}host;
        proxy_set_header X-Real-IP ${DOLLAR}remote_addr;
        proxy_set_header X-Forwarded-For ${DOLLAR}proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto ${DOLLAR}scheme;

        # Caching setup
        proxy_cache api_cache;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_bypass ${DOLLAR}http_authorization;
        proxy_no_cache ${DOLLAR}http_authorization;

        # Custom header to monitor cache hit/miss status
        add_header X-Cache-Status ${DOLLAR}upstream_cache_status;

        # Gzip JSON response
        gzip on;
        gzip_types application/json;
        gzip_min_length 1000;
    }

    # Proxy other API requests to Flask backend (no caching for transactions and admin stats)
    location ~ ^/(auth|orders|order|admin|health) {
        proxy_pass http://backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host ${DOLLAR}host;
        proxy_set_header X-Real-IP ${DOLLAR}remote_addr;
        proxy_set_header X-Forwarded-For ${DOLLAR}proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto ${DOLLAR}scheme;

    }
}
