# Configure cache zone for microcaching (5 seconds TTL)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=10m use_temp_path=off;

server {
    listen 80;

    # Serve frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
        
        # Gzip compression for static files
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
        gzip_min_length 1000;
    }

    # Proxy API requests to Flask backend with Caching for Products (read-heavy public endpoint)
    location ~ ^/products {
        proxy_pass http://$FLASK_SERVER_ADDR;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caching setup
        proxy_cache api_cache;
        proxy_cache_valid 200 5s; # Cache successful GET requests for 5 seconds
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_bypass $http_authorization; # Bypass cache for authorized users (just in case)
        proxy_no_cache $http_authorization;
        
        # Custom header to monitor cache hit/miss status
        add_header X-Cache-Status $upstream_cache_status;
        
        # Gzip JSON response
        gzip on;
        gzip_types application/json;
        gzip_min_length 1000;
    }

    # Proxy other API requests to Flask backend (no caching for transactions and admin stats)
    location ~ ^/(auth|orders|order|admin|health) {
        proxy_pass http://$FLASK_SERVER_ADDR;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
